# آینه پروکسی PyPI — p.mirror.hesabix.ir (HTTP + HTTPS)
# گواهی: /etc/nginx/ssl/p.mirror.hesabix.ir.{key,fullchain.pem}
# upstream Runflare: mirror-pypi.runflare.com؛ در snippets/p-mirror-pypi-location.conf
# هدرهای X-Real-IP/X-Forwarded-For به upstream ارسال نمی‌شوند؛ در بدنهٔ /simple بازنویسی دامنهٔ لینک از Runflare به $host تا pip مستقیم Runflare را نزند (۴۰۲).
#
# پیش‌نیاز: conf.d/pypi-cache.conf (keys_zone=pypi_cache) و conf.d/rate-limit-pypi.conf
# نصب: sudo bash scripts/install_pip_mirror_nginx.sh

server {
    listen 80;
    server_name p.mirror.hesabix.ir;

    access_log /var/log/nginx/pypi_access.log;
    error_log  /var/log/nginx/pypi_error.log;

    include /etc/nginx/snippets/p-mirror-pypi-location.conf;
}

server {
    listen 443 ssl http2;
    server_name p.mirror.hesabix.ir;

    ssl_certificate     /etc/nginx/ssl/p.mirror.hesabix.ir.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/p.mirror.hesabix.ir.key;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/pypi_access.log;
    error_log  /var/log/nginx/pypi_error.log;

    include /etc/nginx/snippets/p-mirror-pypi-location.conf;
}

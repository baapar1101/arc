# آینه پروکسی Dart/Flutter — f.mirror.hesabix.ir (upstream: pub-azs.ir)
# همان الگوی p.mirror.hesabix.ir: HTTP + HTTPS روی مبدأ (برای WCDN / origin-HTTPS)
# PUB_HOSTED_URL=https://f.mirror.hesabix.ir/pub
# FLUTTER_STORAGE_BASE_URL=https://f.mirror.hesabix.ir/gcs
#
# گواهی: /etc/nginx/ssl/f.mirror.hesabix.ir.{key,fullchain.pem} (نصب: scripts/install_flutter_mirror_nginx.sh)
# برای مرورگر بدون هشدار: بعداً مسیرها را مثل p به LE یا public CA عوض کن.

proxy_cache_path /var/cache/nginx/flutter_cache
    levels=1:2
    keys_zone=flutter_cache:200m
    max_size=20g
    inactive=14d
    use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name f.mirror.hesabix.ir;

    access_log /var/log/nginx/f.mirror.hesabix.ir_access.log;
    error_log  /var/log/nginx/f.mirror.hesabix.ir_error.log;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        alias /var/lib/hesabix/acme/.well-known/acme-challenge/;
    }

    include /etc/nginx/snippets/f.mirror-hesabix-server.inc;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name f.mirror.hesabix.ir;

    ssl_certificate     /etc/nginx/ssl/f.mirror.hesabix.ir.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/f.mirror.hesabix.ir.key;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/f.mirror.hesabix.ir_access.log;
    error_log  /var/log/nginx/f.mirror.hesabix.ir_error.log;

    include /etc/nginx/snippets/f.mirror-hesabix-server.inc;
}

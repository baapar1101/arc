# آینه Gradle / Android Maven / پلاگین‌ها — gradle.mirror.hesabix.ir (پراکسی mirror-maven.runflare.com)
#
# نصب: sudo bash scripts/install_gradle_mirror_nginx.sh
# گواهی: /etc/nginx/ssl/gradle.mirror.hesabix.ir.{key,fullchain.pem}

proxy_cache_path /var/cache/nginx/gradle_mirror_cache
    levels=1:2
    keys_zone=gradle_mirror_cache:200m
    max_size=15g
    inactive=30d
    use_temp_path=off;

upstream hesabix_runflare_gradle {
    server mirror-maven.runflare.com:443;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name gradle.mirror.hesabix.ir;

    access_log /var/log/nginx/gradle.mirror.hesabix.ir_access.log;
    error_log  /var/log/nginx/gradle.mirror.hesabix.ir_error.log;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        alias /var/lib/hesabix/acme/.well-known/acme-challenge/;
    }

    include /etc/nginx/snippets/gradle.mirror-hesabix-server.inc;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gradle.mirror.hesabix.ir;

    ssl_certificate     /etc/nginx/ssl/gradle.mirror.hesabix.ir.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/gradle.mirror.hesabix.ir.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/gradle.mirror.hesabix.ir_access.log;
    error_log  /var/log/nginx/gradle.mirror.hesabix.ir_error.log;

    include /etc/nginx/snippets/gradle.mirror-hesabix-server.inc;
}

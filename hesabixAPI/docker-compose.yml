version: "3.9"
services:
  db:
    image: mysql:8.4
    container_name: hesabix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hesabix
      MYSQL_USER: hesabix
      MYSQL_PASSWORD: change_me
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql.conf:/etc/mysql/conf.d/custom.cnf:ro  # Phase 1: MySQL Configuration
      - ./mysql-logs:/var/log/mysql  # برای Log Files
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: hesabix-api
    environment:
      APP_NAME: Hesabix API
      ENVIRONMENT: development
      DEBUG: "true"
      API_V1_PREFIX: /api/v1
      APP_VERSION: 0.1.0
      DB_USER: hesabix
      DB_PASSWORD: change_me
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: hesabix
      SQLALCHEMY_ECHO: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

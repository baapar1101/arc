import org.gradle.api.artifacts.repositories.MavenArtifactRepository

group 'com.example.desktop_drop'
version '1.0-SNAPSHOT'

// داخل maven { } delegate = MavenArtifactRepository؛ شناسه‌های بدون واسطه (حتی rootProject) روی delegate resolve می‌شوند.
// از project صریح در allprojects و از project در buildscript برای رسیدن به gradle.properties ریشه استفاده می‌شود.

buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        maven { MavenArtifactRepository repo ->
            def p = new Properties()
            def gf = project.rootProject.file('gradle.properties')
            if (gf.exists()) {
                gf.withReader('UTF-8') { Reader r -> p.load(r) }
            }
            def base = (p.getProperty('hesabix.gradle.mirror') ?: 'https://gradle.mirror.hesabix.ir').toString().trim().replaceAll(/\/+$/, '')
            repo.url = base + '/android/maven2/'
        }
        maven { MavenArtifactRepository repo ->
            def p = new Properties()
            def gf = project.rootProject.file('gradle.properties')
            if (gf.exists()) {
                gf.withReader('UTF-8') { Reader r -> p.load(r) }
            }
            def base = (p.getProperty('hesabix.gradle.mirror') ?: 'https://gradle.mirror.hesabix.ir').toString().trim().replaceAll(/\/+$/, '')
            repo.url = base + '/maven2/'
        }
        maven { MavenArtifactRepository repo ->
            def p = new Properties()
            def gf = project.rootProject.file('gradle.properties')
            if (gf.exists()) {
                gf.withReader('UTF-8') { Reader r -> p.load(r) }
            }
            def base = (p.getProperty('hesabix.gradle.mirror') ?: 'https://gradle.mirror.hesabix.ir').toString().trim().replaceAll(/\/+$/, '')
            repo.url = base + '/gradle-plugins/'
        }
        mavenCentral()
        google()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

rootProject.allprojects { proj ->
    repositories {
        maven { MavenArtifactRepository repo ->
            def p = new Properties()
            def gf = proj.rootProject.file('gradle.properties')
            if (gf.exists()) {
                gf.withReader('UTF-8') { Reader r -> p.load(r) }
            }
            def base = (p.getProperty('hesabix.gradle.mirror') ?: 'https://gradle.mirror.hesabix.ir').toString().trim().replaceAll(/\/+$/, '')
            repo.url = base + '/android/maven2/'
        }
        maven { MavenArtifactRepository repo ->
            def p = new Properties()
            def gf = proj.rootProject.file('gradle.properties')
            if (gf.exists()) {
                gf.withReader('UTF-8') { Reader r -> p.load(r) }
            }
            def base = (p.getProperty('hesabix.gradle.mirror') ?: 'https://gradle.mirror.hesabix.ir').toString().trim().replaceAll(/\/+$/, '')
            repo.url = base + '/maven2/'
        }
        maven { MavenArtifactRepository repo ->
            def p = new Properties()
            def gf = proj.rootProject.file('gradle.properties')
            if (gf.exists()) {
                gf.withReader('UTF-8') { Reader r -> p.load(r) }
            }
            def base = (p.getProperty('hesabix.gradle.mirror') ?: 'https://gradle.mirror.hesabix.ir').toString().trim().replaceAll(/\/+$/, '')
            repo.url = base + '/gradle-plugins/'
        }
        mavenCentral()
        google()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    // Conditional for compatibility with AGP <4.2.
    if (project.android.hasProperty("namespace")) {
        namespace 'one.mixin.desktop.drop'
    }

    compileSdk 33

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 16
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}

  <style>
    /* پالت هماهنگ با گرادیان #0175C2 → #02579B */
    #flutter-loading-screen {
      --loader-fg: rgba(255, 255, 255, 0.96);
      --loader-fg-muted: rgba(230, 245, 255, 0.88);
      --loader-fg-subtle: rgba(200, 230, 255, 0.72);
      --loader-ring: rgba(255, 255, 255, 0.22);
      --loader-ring-accent: #E1F5FE;
      --loader-glow: rgba(0, 40, 80, 0.35);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #02579B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      box-sizing: border-box;
      padding: 24px 20px;
      text-align: center;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      overflow: hidden;
    }

    .loading-screen-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        125deg,
        #015a9e 0%,
        #0175C2 35%,
        #0288d1 55%,
        #02579B 85%,
        #014a82 100%
      );
      background-size: 220% 220%;
      animation: loaderGradientShift 18s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes loaderGradientShift {
      0%, 100% { background-position: 0% 40%; }
      50% { background-position: 100% 60%; }
    }

    .loading-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 26rem;
      padding: 1.75rem 1.35rem 1.5rem;
      border-radius: 20px;
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.05) 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 4px 24px rgba(0, 20, 50, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    @supports (backdrop-filter: blur(12px)) {
      .loading-card {
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
    }
    
    #flutter-loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 22rem;
      margin: 0 auto;
    }

    .loading-title-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      margin-bottom: 0.35rem;
    }

    .loading-brand-fa {
      margin: 0;
      color: var(--loader-fg-muted);
      font-family: Tahoma, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    
    .loading-logo {
      display: block;
      width: clamp(72px, 18vw, 96px);
      height: clamp(72px, 18vw, 96px);
      margin: 0 auto 12px;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 4px 20px var(--loader-glow));
      animation: pulse 2.2s ease-in-out infinite;
    }
    
    .loading-title-row .loading-title {
      margin: 0;
    }

    .loading-title {
      margin: 0 0 6px;
      color: var(--loader-fg);
      font-family: Tahoma, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 2px var(--loader-glow);
    }

    .loading-subtitle {
      margin: 0 0 1.1rem;
      color: var(--loader-fg-subtle);
      font-family: Tahoma, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.55;
    }

    .loading-steps {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0.35rem;
      width: 100%;
      max-width: 20rem;
      margin: 0 auto 1rem;
      direction: rtl;
    }

    .loading-step {
      flex: 1;
      min-width: 0;
      text-align: center;
    }

    .loading-step__icon {
      width: 28px;
      height: 28px;
      margin: 0 auto 0.35rem;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.28);
      background: rgba(0, 30, 60, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.55);
      font-family: Tahoma, 'Segoe UI', sans-serif;
      transition: border-color 0.25s ease, background 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }

    .loading-step.is-active .loading-step__icon {
      border-color: var(--loader-ring-accent);
      background: rgba(255, 255, 255, 0.18);
      color: var(--loader-fg);
      box-shadow: 0 0 0 3px rgba(225, 245, 254, 0.15);
    }

    .loading-step.is-done .loading-step__icon {
      border-color: rgba(180, 230, 255, 0.55);
      background: rgba(0, 80, 120, 0.35);
      color: #b3e5fc;
    }

    .loading-step.is-done .loading-step__icon::after {
      content: '✓';
      font-size: 0.8rem;
      line-height: 1;
    }

    .loading-step.is-done .loading-step__num {
      display: none;
    }

    .loading-step__label {
      display: block;
      font-family: Tahoma, 'Segoe UI', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.52);
      line-height: 1.35;
    }

    .loading-step.is-active .loading-step__label {
      color: var(--loader-fg-muted);
    }

    .loading-step.is-done .loading-step__label {
      color: rgba(200, 235, 255, 0.75);
    }

    .loading-quote {
      margin: 0 0 1.15rem;
      max-width: 20rem;
      color: var(--loader-fg-muted);
      font-family: Tahoma, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.82rem;
      font-style: italic;
      font-weight: 400;
      line-height: 1.75;
      text-align: center;
      padding: 0.85rem 1.1rem 0.95rem;
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.04) 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .loading-quote__mark {
      color: rgba(200, 230, 255, 0.55);
      font-style: normal;
      font-size: 1.05em;
    }
    
    .loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--loader-ring);
      border-top-color: var(--loader-ring-accent);
      border-right-color: rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }

    .loading-progress-wrap {
      width: 100%;
      max-width: 18rem;
      height: 6px;
      margin: 0 auto 12px;
      border-radius: 999px;
      background: rgba(0, 30, 60, 0.35);
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .loading-progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #b3e5fc, #e1f5fe, #ffffff);
      box-shadow: 0 0 12px rgba(225, 245, 254, 0.45);
      transition: width 0.18s ease-out;
    }

    .loading-progress-wrap.is-indeterminate .loading-progress-bar {
      width: 38% !important;
      animation: loaderIndeterminate 1.1s ease-in-out infinite;
    }

    @keyframes loaderIndeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(320%); }
    }
    
    .loading-text {
      color: var(--loader-fg-muted);
      font-family: Tahoma, 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      margin: 0;
      min-height: 2.6em;
      line-height: 1.45;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(0.97); }
    }

    @media (prefers-reduced-motion: reduce) {
      #flutter-loading-screen {
        transition: none;
      }
      .loading-screen-bg {
        animation: none;
        background-size: 100% 100%;
        background-position: center;
      }
      .loading-logo,
      .loading-spinner {
        animation: none;
      }
      .loading-spinner {
        border-right-color: var(--loader-ring);
        opacity: 0.95;
      }
      .loading-progress-wrap.is-indeterminate .loading-progress-bar {
        animation: none;
        width: 45% !important;
        margin: 0 auto;
        transform: none;
      }
    }
    
    /* تنظیم پایه‌ای ارتفاع صفحه برای هماهنگی بهتر با موبایل */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* برای جلوگیری از flash محتوا و کنترل اسکرول اولیه */
    body {
      overflow: hidden;
      /* در صورت بروز فضای سفید، حداقل پس‌زمینه یکدست داشته باشیم */
      background-color: #ffffff;
      /* استفاده از height پویا بر اساس متغیر محاسبه‌شده برای موبایل */
      min-height: var(--app-height, 100vh);
    }
    
    /* وقتی Flutter لود شد، body را دوباره قابل اسکرول می‌کنیم */
    body.flutter-ready {
      overflow: auto;
    }

    /* اطمینان از اینکه ریشه‌ی Flutter تمام ارتفاع در دسترس را پوشش می‌دهد */
    flt-glass-pane, flt-scene-host {
      width: 100% !important;
      height: 100% !important;
    }

    /* در مرورگرهای مدرن، از 100dvh که با کیبورد سازگارتر است استفاده می‌کنیم */
    @supports (height: 100dvh) {
      body {
        min-height: 100dvh;
      }
    }
  </style>

  <script>
    (function () {
      var QUOTES = [
        'برای امنیت بیشتر، پس از کار حتماً از حساب خود خارج شوید.',
        'نسخهٔ وب حسابیکس را در مرورگر به‌روز نگه دارید تا از آخرین بهبودها بهره ببرید.',
        'فاکتور و اسناد مالی را منظم ثبت کنید؛ گزارش دقیق از همین‌جا شروع می‌شود.',
        'از پشتیبان‌گیری منظم داده‌های کسب‌وکار خود غافل نشوید.',
        'میانبرهای صفحه‌کلید در بخش راهنما می‌تواند سرعت کار شما را بالا ببرد.'
      ];
      var quoteIndex = 0;
      var quoteTimer = null;

      function applyLoadingPhase(phase) {
        var steps = document.querySelectorAll('#flutter-loading-screen .loading-step');
        var p = parseInt(phase, 10);
        if (isNaN(p)) p = 0;
        p = Math.max(0, Math.min(2, p));
        for (var i = 0; i < steps.length; i++) {
          var el = steps[i];
          var idx = parseInt(el.getAttribute('data-step') || String(i), 10);
          el.classList.remove('is-active', 'is-done');
          if (idx < p) el.classList.add('is-done');
          else if (idx === p) el.classList.add('is-active');
        }
      }

      function setDownloadProgress(percent) {
        var wrap = document.getElementById('loading-progress-wrap');
        var bar = document.getElementById('loading-progress-bar');
        if (!wrap || !bar) return;
        if (percent == null || typeof percent !== 'number' || isNaN(percent)) {
          wrap.classList.add('is-indeterminate');
          bar.style.width = '0%';
          return;
        }
        wrap.classList.remove('is-indeterminate');
        var clamped = Math.max(0, Math.min(100, percent));
        bar.style.width = clamped + '%';
      }

      window.__hesabixLoaderUI = {
        setLoadingPhase: applyLoadingPhase,
        setDownloadProgress: setDownloadProgress,
        _quoteTimer: null,
        startQuoteRotation: function () {
          if (quoteTimer) return;
          var el = document.getElementById('loading-quote-text');
          if (!el) return;
          quoteTimer = setInterval(function () {
            quoteIndex = (quoteIndex + 1) % QUOTES.length;
            el.textContent = QUOTES[quoteIndex];
          }, 9000);
          this._quoteTimer = quoteTimer;
        },
        stopQuoteRotation: function () {
          if (quoteTimer) {
            clearInterval(quoteTimer);
            quoteTimer = null;
          }
          this._quoteTimer = null;
        }
      };

      function onDomReady() {
        applyLoadingPhase(0);
        if (window.__hesabixLoaderUI && window.__hesabixLoaderUI.startQuoteRotation) {
          window.__hesabixLoaderUI.startQuoteRotation();
        }
        setTimeout(function () {
          applyLoadingPhase(1);
        }, 400);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', onDomReady);
      } else {
        onDomReady();
      }
    })();
  </script>
  
  <script>
    // همگام‌سازی ارتفاع صفحه با visual viewport برای جلوگیری از فضای سفید زیرین هنگام نمایش کیبورد
    (function() {
      function updateAppHeight() {
        try {
          var height;
          if (window.visualViewport && window.visualViewport.height) {
            height = window.visualViewport.height;
          } else {
            height = window.innerHeight || document.documentElement.clientHeight;
          }
          document.documentElement.style.setProperty('--app-height', height + 'px');
        } catch (e) {
          // در صورت بروز خطا، تغییری اعمال نکنیم تا رفتار پیش‌فرض حفظ شود
          console.warn('[Hesabix] Failed to update app height', e);
        }
      }

      // اجرای اولیه
      window.addEventListener('load', updateAppHeight);
      // تغییر اندازه (چرخش، باز و بسته شدن کیبورد و غیره)
      window.addEventListener('resize', updateAppHeight);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateAppHeight);
        window.visualViewport.addEventListener('scroll', updateAppHeight);
      }
    })();

    // پنهان کردن loading screen وقتی Flutter آماده شد
    function hideLoadingScreen() {
      const loadingScreen = document.getElementById('flutter-loading-screen');
      if (loadingScreen) {
        if (window.__hesabixLoaderUI && typeof window.__hesabixLoaderUI.stopQuoteRotation === 'function') {
          window.__hesabixLoaderUI.stopQuoteRotation();
        }
        loadingScreen.setAttribute('aria-busy', 'false');
        loadingScreen.classList.add('hidden');
        setTimeout(function() {
          loadingScreen.remove();
          document.body.classList.add('flutter-ready');
        }, 500);
      }
    }
    
    // گوش دادن به رویداد flutter-first-frame
    window.addEventListener('flutter-first-frame', function() {
      hideLoadingScreen();
      setTimeout(function() {
        const router = window._flutterNavigationState?.router;
        if (router) {
          console.log('Flutter app loaded, routes are available');
        }
      }, 1000);
    }, { once: true });
    
    // Fallback: اگر بعد از مدت طولانی Flutter لود نشد، loading screen را پنهان کن
    // (پیش‌بار main.dart.js + CanvasKit ممکن است بیش از ۱۰ ثانیه طول بکشد)
    setTimeout(function() {
      const loadingScreen = document.getElementById('flutter-loading-screen');
      if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
        console.warn('Flutter loading timeout - hiding loading screen');
        hideLoadingScreen();
      }
    }, 120000);
    
    // پیکربندی صحیح Flutter با روش جدید - intercept loader قبل از اجرای flutter_bootstrap
    if (!window._flutter) {
      window._flutter = {};
    }
    
    // ذخیره تابع اصلی load برای override کردن بعداً
    window._flutterConfig = {
      canvasKitBaseUrl: "canvaskit/",
      renderer: "canvaskit",
      useLocalCanvasKit: true,
      // فونت‌های fallback موتور (و Roboto اضطراری) از همین مبدأ؛ نه fonts.gstatic.com
      fontFallbackBaseUrl: (function () {
        try {
          return new URL("fonts/gstatic/s/", document.baseURI).href;
        } catch (e) {
          return "fonts/gstatic/s/";
        }
      })()
    };
    
    // Intercept loader.load() برای اضافه کردن configuration
    Object.defineProperty(window._flutter, 'loader', {
      set: function(loader) {
        this._loaderInstance = loader;
        
        // Override load method
        if (loader && typeof loader.load === 'function') {
          const originalLoad = loader.load;
          loader.load = function(options) {
            options = options || {};
            options.config = options.config || {};
            
            // اعمال configuration محلی
            Object.assign(options.config, window._flutterConfig);
            
            console.log('[Flutter] Local CanvasKit + local fontFallbackBaseUrl (no fonts.gstatic.com)');
            return originalLoad.call(loader, options);
          };
        }
      },
      get: function() {
        return this._loaderInstance;
      },
      configurable: true
    });
  </script>

      var SESSION_PENDING = 'hesabix_pending_build';
      var SESSION_NO_SW_RELOAD = 'hesabix_no_sw_build_reload';
      var UPDATE_BANNER_ID = 'flutter-update-banner';
      var hasReloadedForUpdate = false;
      var VERSION_POLL_MS = 5 * 60 * 1000;

      function storageGet(key) {
        try {
          return localStorage.getItem(key);
        } catch (e) {
          return null;
        }
      }

      function storageSet(key, val) {
        try {
          localStorage.setItem(key, val);
        } catch (e) {}
      }

      function sessionGet(key) {
        try {
          return sessionStorage.getItem(key);
        } catch (e) {
          return null;
        }
      }

      function sessionSet(key, val) {
        try {
          sessionStorage.setItem(key, val);
        } catch (e) {}
      }

      function sessionRemove(key) {
        try {
          sessionStorage.removeItem(key);
        } catch (e) {}
      }

      function commitPendingBuildBeforeReload() {
        var pb = sessionGet(SESSION_PENDING);
        if (pb) {
          storageSet(STORAGE_BUILD, pb);
          sessionRemove(SESSION_PENDING);
        }
      }

      function createUpdateBanner() {
        if (document.getElementById(UPDATE_BANNER_ID)) {
          return;
        }

        var defaultFont = (window.getComputedStyle && window.getComputedStyle(document.body).fontFamily) || "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif";

        var banner = document.createElement('div');
        banner.id = UPDATE_BANNER_ID;
        banner.style.position = 'fixed';
        banner.style.bottom = '16px';
        banner.style.left = '50%';
        banner.style.transform = 'translateX(-50%)';
        banner.style.background = '#0175C2';
        banner.style.color = '#ffffff';
        banner.style.padding = '12px 16px';
        banner.style.borderRadius = '14px';
        banner.style.boxShadow = '0 8px 24px rgba(0, 0, 0, 0.25)';
        banner.style.zIndex = '10000';
        banner.style.display = 'flex';
        banner.style.alignItems = 'center';
        banner.style.gap = '12px';
        banner.style.fontFamily = defaultFont;
        banner.style.fontSize = '14px';
        banner.style.direction = 'rtl';
        banner.style.width = 'calc(100% - 24px)';
        banner.style.maxWidth = '520px';
        banner.style.flexWrap = 'wrap';
        banner.style.justifyContent = 'space-between';

        var text = document.createElement('span');
        text.textContent = 'نسخه جدید حسابیکس در حال اعمال است، صفحه به زودی به‌روزرسانی می‌شود.';
        text.style.flex = '1';
        text.style.fontFamily = 'inherit';

        var closeBtn = document.createElement('button');
        closeBtn.textContent = 'بستن';
        closeBtn.style.background = 'transparent';
        closeBtn.style.color = '#ffffff';
        closeBtn.style.border = '1px solid rgba(255, 255, 255, 0.6)';
        closeBtn.style.borderRadius = '10px';
        closeBtn.style.padding = '6px 12px';
        closeBtn.style.cursor = 'pointer';
        closeBtn.style.fontWeight = '600';
        closeBtn.style.fontSize = '12px';
        closeBtn.style.opacity = '0.9';
        closeBtn.style.fontFamily = 'inherit';

        closeBtn.addEventListener('click', function() {
          try {
            document.body.removeChild(banner);
          } catch (e) {}
        });

        banner.appendChild(text);
        banner.appendChild(closeBtn);
        document.body.appendChild(banner);
      }

      function fetchServerBuild() {
        var url = 'version.json?t=' + Date.now();
        return fetch(url, { cache: 'no-store', credentials: 'same-origin' })
          .then(function(r) {
            if (!r.ok) return null;
            return r.json();
          })
          .then(function(j) {
            return j && typeof j.build === 'string' ? j.build : null;
          })
          .catch(function() {
            return null;
          });
      }

      function tryActivateWaitingWorker() {
        return navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg && reg.waiting) {
            reg.waiting.postMessage('skipWaiting');
            return true;
          }
          return false;
        });
      }

      /** اگر waiting باشد skipWaiting؛ در غیر این صورت فقط در مسیر قدیمی SW به reload برگردیم تا از حلقه جلوگیری شود */
      function requestAppUpdate(allowReloadFallback) {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg && reg.waiting) {
            reg.waiting.postMessage('skipWaiting');
          } else if (allowReloadFallback) {
            window.location.reload();
          }
        }).catch(function() {
          if (allowReloadFallback) {
            window.location.reload();
          }
        });
      }

      function onServerNewerBuild(reg, serverBuild) {
        sessionSet(SESSION_PENDING, serverBuild);
        createUpdateBanner();

        if (reg) {
          reg.update()
            .then(function() {
              return tryActivateWaitingWorker();
            })
            .then(function(activated) {
              if (activated) return;
              return new Promise(function(resolve) {
                setTimeout(resolve, 400);
              }).then(function() {
                return tryActivateWaitingWorker();
              });
            })
            .then(function(activated) {
              if (activated) return;
              return new Promise(function(resolve) {
                setTimeout(resolve, 1600);
              }).then(function() {
                return tryActivateWaitingWorker();
              });
            })
            .catch(function() {});
        } else {
          if (!sessionGet(SESSION_NO_SW_RELOAD)) {
            sessionSet(SESSION_NO_SW_RELOAD, '1');
            storageSet(STORAGE_BUILD, serverBuild);
            window.location.reload();
          }
        }
      }

      function runVersionCheck(reg) {
        fetchServerBuild().then(function(serverBuild) {
          if (!serverBuild) return;

          var stored = storageGet(STORAGE_BUILD);
          if (stored === null || stored === '') {
            storageSet(STORAGE_BUILD, serverBuild);
            return;
          }
          if (stored === serverBuild) {
            sessionRemove(SESSION_NO_SW_RELOAD);
            return;
          }

          onServerNewerBuild(reg, serverBuild);
        });
      }

      function startVersionPolling(reg) {
        runVersionCheck(reg);
        setInterval(function() {
          if (document.visibilityState === 'visible') {
            runVersionCheck(reg);
          }
        }, VERSION_POLL_MS);
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            runVersionCheck(reg);
          }
        });
      }

      function setupServiceWorkerUpdateFlow() {
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (hasReloadedForUpdate) return;
          hasReloadedForUpdate = true;
          commitPendingBuildBeforeReload();
          window.location.reload();
        });

        navigator.serviceWorker.ready
          .then(function(reg) {
            if (!reg) return;

            startVersionPolling(reg);

            function handleWaiting(worker) {
              if (!worker) return;
              if (navigator.serviceWorker.controller) {
                createUpdateBanner();
                requestAppUpdate(true);
              }
            }

            if (reg.waiting) {
              handleWaiting(reg.waiting);
            }

            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (!newWorker) return;

              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed') {
                  handleWaiting(reg.waiting || newWorker);
                }
              });
            });
          })
          .catch(function() {});
      }

      window.addEventListener('load', function() {
        if ('serviceWorker' in navigator) {
          setupServiceWorkerUpdateFlow();
        } else {
          startVersionPolling(null);
        }
      });
    })();
  </script>

  <script src="flutter_web_preload.js" defer></script>
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>

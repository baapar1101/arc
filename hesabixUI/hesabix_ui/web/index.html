<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hesabix - سیستم مدیریت مالی">
  <!-- viewport-fit=cover برای مدیریت بهتر فضای پایین صفحه روی موبایل (خصوصاً iOS) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hesabix_ui">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hesabix</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Preconnect and DNS prefetch for API to improve connection speed -->
  <link rel="preconnect" href="https://hsxn.hesabix.ir" crossorigin>
  <link rel="dns-prefetch" href="https://hsxn.hesabix.ir">
  
  <!-- Preload critical resources for faster page loads -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  
  <!-- Initial Loading Screen Styles -->
  <style>
    /* Loading screen که قبل از Flutter نمایش داده می‌شود */
    #flutter-loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0175C2 0%, #02579B 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }
    
    #flutter-loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    .loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    
    .loading-text {
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      font-weight: 500;
      opacity: 0.9;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.95); }
    }
    
    /* تنظیم پایه‌ای ارتفاع صفحه برای هماهنگی بهتر با موبایل */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* برای جلوگیری از flash محتوا و کنترل اسکرول اولیه */
    body {
      overflow: hidden;
      /* در صورت بروز فضای سفید، حداقل پس‌زمینه یکدست داشته باشیم */
      background-color: #ffffff;
      /* استفاده از height پویا بر اساس متغیر محاسبه‌شده برای موبایل */
      min-height: var(--app-height, 100vh);
    }
    
    /* وقتی Flutter لود شد، body را دوباره قابل اسکرول می‌کنیم */
    body.flutter-ready {
      overflow: auto;
    }

    /* اطمینان از اینکه ریشه‌ی Flutter تمام ارتفاع در دسترس را پوشش می‌دهد */
    flt-glass-pane, flt-scene-host {
      width: 100% !important;
      height: 100% !important;
    }

    /* در مرورگرهای مدرن، از 100dvh که با کیبورد سازگارتر است استفاده می‌کنیم */
    @supports (height: 100dvh) {
      body {
        min-height: 100dvh;
      }
    }
  </style>
  
  <!-- Suppress Intl.v8BreakIterator deprecation warning -->
  <script>
    // Override console.warn to filter out Intl.v8BreakIterator deprecation warnings
    const originalWarn = console.warn;
    console.warn = function(...args) {
      const message = args.join(' ');
      if (message.includes('Intl.v8BreakIterator is deprecated') || 
          message.includes('Please use Intl.Segmenter instead')) {
        return; // Suppress this specific warning
      }
      originalWarn.apply(console, args);
    };
  </script>
</head>
<body>
  <!-- Initial Loading Screen - نمایش داده می‌شود تا Flutter لود شود -->
  <div id="flutter-loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">در حال بارگذاری...</div>
  </div>
  
  <script>
    // همگام‌سازی ارتفاع صفحه با visual viewport برای جلوگیری از فضای سفید زیرین هنگام نمایش کیبورد
    (function() {
      function updateAppHeight() {
        try {
          var height;
          if (window.visualViewport && window.visualViewport.height) {
            height = window.visualViewport.height;
          } else {
            height = window.innerHeight || document.documentElement.clientHeight;
          }
          document.documentElement.style.setProperty('--app-height', height + 'px');
        } catch (e) {
          // در صورت بروز خطا، تغییری اعمال نکنیم تا رفتار پیش‌فرض حفظ شود
          console.warn('[Hesabix] Failed to update app height', e);
        }
      }

      // اجرای اولیه
      window.addEventListener('load', updateAppHeight);
      // تغییر اندازه (چرخش، باز و بسته شدن کیبورد و غیره)
      window.addEventListener('resize', updateAppHeight);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateAppHeight);
        window.visualViewport.addEventListener('scroll', updateAppHeight);
      }
    })();

    // پنهان کردن loading screen وقتی Flutter آماده شد
    function hideLoadingScreen() {
      const loadingScreen = document.getElementById('flutter-loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
        setTimeout(function() {
          loadingScreen.remove();
          document.body.classList.add('flutter-ready');
        }, 500);
      }
    }
    
    // گوش دادن به رویداد flutter-first-frame
    window.addEventListener('flutter-first-frame', function() {
      hideLoadingScreen();
      setTimeout(function() {
        const router = window._flutterNavigationState?.router;
        if (router) {
          console.log('Flutter app loaded, routes are available');
        }
      }, 1000);
    }, { once: true });
    
    // Fallback: اگر بعد از 10 ثانیه Flutter لود نشد، loading screen را پنهان کن
    setTimeout(function() {
      const loadingScreen = document.getElementById('flutter-loading-screen');
      if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
        console.warn('Flutter loading timeout - hiding loading screen');
        hideLoadingScreen();
      }
    }, 10000);
    
    // پیکربندی صحیح Flutter با روش جدید - intercept loader قبل از اجرای flutter_bootstrap
    if (!window._flutter) {
      window._flutter = {};
    }
    
    // ذخیره تابع اصلی load برای override کردن بعداً
    window._flutterConfig = {
      canvasKitBaseUrl: "canvaskit/",
      renderer: "canvaskit", 
      useLocalCanvasKit: true
    };
    
    // Intercept loader.load() برای اضافه کردن configuration
    Object.defineProperty(window._flutter, 'loader', {
      set: function(loader) {
        this._loaderInstance = loader;
        
        // Override load method
        if (loader && typeof loader.load === 'function') {
          const originalLoad = loader.load;
          loader.load = function(options) {
            options = options || {};
            options.config = options.config || {};
            
            // اعمال configuration محلی
            Object.assign(options.config, window._flutterConfig);
            
            console.log('[Flutter] Using local CanvasKit from: canvaskit/');
            return originalLoad.call(loader, options);
          };
        }
      },
      get: function() {
        return this._loaderInstance;
      },
      configurable: true
    });
  </script>

  <!-- App update notification & auto-reload when a new Service Worker version is available -->
  <script>
    (function() {
      if (!('serviceWorker' in navigator)) {
        return;
      }

      var UPDATE_BANNER_ID = 'flutter-update-banner';
      var hasReloadedForUpdate = false;

      function createUpdateBanner() {
        if (document.getElementById(UPDATE_BANNER_ID)) {
          return;
        }

        var banner = document.createElement('div');
        banner.id = UPDATE_BANNER_ID;
        banner.style.position = 'fixed';
        banner.style.bottom = '16px';
        banner.style.left = '50%';
        banner.style.transform = 'translateX(-50%)';
        banner.style.background = '#0175C2';
        banner.style.color = '#ffffff';
        banner.style.padding = '10px 16px';
        banner.style.borderRadius = '999px';
        banner.style.boxShadow = '0 8px 24px rgba(0, 0, 0, 0.25)';
        banner.style.zIndex = '10000';
        banner.style.display = 'flex';
        banner.style.alignItems = 'center';
        banner.style.gap = '10px';
        banner.style.fontFamily = "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif";
        banner.style.fontSize = '14px';
        banner.style.direction = 'rtl';

        var text = document.createElement('span');
        text.textContent = 'نسخه جدید حسابیکس آماده استفاده است.';

        var refreshBtn = document.createElement('button');
        refreshBtn.textContent = 'به\u200cروزرسانی';
        refreshBtn.style.background = '#ffffff';
        refreshBtn.style.color = '#0175C2';
        refreshBtn.style.border = 'none';
        refreshBtn.style.borderRadius = '999px';
        refreshBtn.style.padding = '6px 14px';
        refreshBtn.style.cursor = 'pointer';
        refreshBtn.style.fontWeight = '600';
        refreshBtn.style.fontSize = '13px';

        var laterBtn = document.createElement('button');
        laterBtn.textContent = 'بعداً';
        laterBtn.style.background = 'transparent';
        laterBtn.style.color = '#ffffff';
        laterBtn.style.border = 'none';
        laterBtn.style.cursor = 'pointer';
        laterBtn.style.fontSize = '13px';
        laterBtn.style.opacity = '0.9';

        refreshBtn.addEventListener('click', function() {
          try {
            document.body.removeChild(banner);
          } catch (e) {}
          requestAppUpdate();
        });

        laterBtn.addEventListener('click', function() {
          try {
            document.body.removeChild(banner);
          } catch (e) {}
        });

        banner.appendChild(text);
        banner.appendChild(refreshBtn);
        banner.appendChild(laterBtn);
        document.body.appendChild(banner);
      }

      function requestAppUpdate() {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg && reg.waiting) {
            // به Service Worker می‌گوییم فوراً نسخه جدید را فعال کند
            reg.waiting.postMessage('skipWaiting');
          } else {
            // اگر به هر دلیل waiting نداریم، fallback به reload ساده
            window.location.reload();
          }
        }).catch(function() {
          window.location.reload();
        });
      }

      function setupUpdateFlow() {
        // وقتی Service Worker کنترل صفحه را عوض کرد، یک بار صفحه را ریفرش کن
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (hasReloadedForUpdate) return;
          hasReloadedForUpdate = true;
          window.location.reload();
        });

        navigator.serviceWorker.ready
          .then(function(reg) {
            if (!reg) return;

            function handleWaiting(worker) {
              if (!worker) return;
              // اگر صفحه فعلی از قبل توسط یک SW کنترل می‌شود، یعنی نسخه جدید نسبت به نسخه فعلی است
              if (navigator.serviceWorker.controller) {
                createUpdateBanner();
              }
            }

            // اگر از قبل یک SW در حالت waiting داریم (مثلاً کاربر بعد از دیپلوی برگشته)
            if (reg.waiting) {
              handleWaiting(reg.waiting);
            }

            // وقتی نسخه جدید Service Worker پیدا شد
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (!newWorker) return;

              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed') {
                  handleWaiting(reg.waiting || newWorker);
                }
              });
            });
          })
          .catch(function() {
            // مشکلی در SW نباید باعث ارور مرئی در UI شود
          });
      }

      window.addEventListener('load', setupUpdateFlow);
    })();
  </script>

  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>

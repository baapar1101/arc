# Hesabix PostgreSQL Optimization Configuration
# این فایل برای سرور با حداقل ~32GB RAM طراحی شده است
# کپی به: /etc/postgresql/VERSION/main/conf.d/hesabix-optimization.conf

# ==============================================================================
# CONNECTIONS - ضروری برای Hesabix (pool_size 150 + max_overflow 150 = 300)
# ==============================================================================
max_connections = 300

# ==============================================================================
# MEMORY - بهینه برای سرور ~32GB RAM
# ==============================================================================
# حافظه مشترک برای کش داده (حدود 25% RAM)
shared_buffers = 8GB

# حافظه تخمینی برای planner (حدود 75% RAM)
effective_cache_size = 24GB

# حافظه هر عملیات sort/hash (افزایش برای کوئری‌های سنگین)
work_mem = 16MB

# حافظه برای VACUUM، CREATE INDEX و ...
maintenance_work_mem = 512MB

# ==============================================================================
# QUERY PLANNER - برای دیسک SSD
# اگر از HDD استفاده می‌کنید، این خط را حذف یا comment کنید
# ==============================================================================
random_page_cost = 1.1

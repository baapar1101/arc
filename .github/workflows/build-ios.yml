name: Build Flutter iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    defaults:
      run:
        working-directory: hesabixUI/hesabix_ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #######################################################################
      # Flutter
      #######################################################################

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      #######################################################################
      # Cache pub packages
      #######################################################################

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('hesabixUI/hesabix_ui/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      #######################################################################
      # Verify project
      #######################################################################

      - name: Verify project
        run: |
          pwd
          ls -la
          test -f pubspec.yaml

      #######################################################################
      # Dependencies
      #######################################################################

      - name: Install Flutter dependencies
        run: flutter pub get

      #######################################################################
      # CocoaPods Cache
      #######################################################################

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            hesabixUI/hesabix_ui/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('hesabixUI/hesabix_ui/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      #######################################################################
      # Install Pods
      #######################################################################

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      #######################################################################
      # Analyze
      #######################################################################

      - name: Analyze
        run: flutter analyze --no-fatal-warnings

      #######################################################################
      # Tests
      #######################################################################

      - name: Run Tests
        run: flutter test
        continue-on-error: true

      #######################################################################
      # Build
      #######################################################################

      - name: Build iOS (No Code Sign)
        run: |
          flutter clean
          flutter build ios \
            --release \
            --no-codesign

      #######################################################################
      # Upload Build
      #######################################################################

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            hesabixUI/hesabix_ui/build/ios/iphoneos

      #######################################################################
      # Upload Logs if Failed
      #######################################################################

      - name: Upload Flutter Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-logs
          path: |
            ~/Library/Logs
            hesabixUI/hesabix_ui/build

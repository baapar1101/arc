name: Build Flutter iOS

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: hesabixUI/hesabix_ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Verify project
        run: |
          pwd
          ls -la
          test -f pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            hesabixUI/hesabix_ui/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('hesabixUI/hesabix_ui/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Analyze
        run: flutter analyze --no-fatal-warnings

      - name: Build iOS (No Code Sign)
        run: flutter build ios --release --no-codesign

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: hesabixUI/hesabix_ui/build/ios
